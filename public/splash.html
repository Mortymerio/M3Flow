<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3Flow Loading</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --accent-color: #6366f1;
            --text-color: #e2e8f0;
            --secondary-text: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-app-region: drag;
        }

        .container {
            width: 450px;
            height: 300px;
            background: var(--bg-color);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            backdrop-filter: blur(20px);
        }

        .logo-container {
            position: relative;
            margin-bottom: 24px;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(99, 102, 241, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(99, 102, 241, 0.5); }
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .status-container {
            width: 80%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: var(--glass-bg);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 30%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-color), #818cf8);
            border-radius: 2px;
            animation: progress 2s infinite ease-in-out;
        }

        @keyframes progress {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        #log-text {
            font-size: 13px;
            color: var(--secondary-text);
            font-family: 'Fira Code', monospace;
            height: 20px;
            opacity: 0.8;
            text-align: center;
            transition: all 0.3s ease;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="icon.png" alt="M3Flow" class="logo">
        </div>
        <div class="title">M3Flow</div>
        <div class="status-container">
            <div id="log-text">Iniciando aplicación...</div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill"></div>
            </div>
        </div>
    </div>

    <script>
        // Escuchar logs desde el proceso principal
        // Como es una ventana de carga simple, usaremos un canal IPC directo si está disponible
        // o esperaremos a que el preload esté configurado.
        try {
            window.electronAPI.onLoadingLog((message) => {
                const logElement = document.getElementById('log-text');
                logElement.style.opacity = '0';
                setTimeout(() => {
                    logElement.innerText = message;
                    logElement.style.opacity = '0.8';
                }, 150);
            });
        } catch (e) {
            console.log('Esperando conexión con Electron...');
        }
    </script>
</body>
</html>
